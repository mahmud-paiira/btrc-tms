version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    container_name: brtc_prod_postgres
    <<: *restart-policy
    logging: *default-logging
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-brtc_tms}
      POSTGRES_USER: ${DB_USER:-brtc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-brtc_user} -d ${DB_NAME:-brtc_tms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: brtc_prod_redis
    <<: *restart-policy
    logging: *default-logging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-brtc}/backend:${IMAGE_TAG:-latest}
    container_name: brtc_prod_backend
    <<: *restart-policy
    logging: *default-logging
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-brtc}/celery-worker:${IMAGE_TAG:-latest}
    container_name: brtc_prod_celery_worker
    <<: *restart-policy
    logging: *default-logging
    command: celery -A brtc_tms worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    volumes:
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-brtc}/celery-beat:${IMAGE_TAG:-latest}
    container_name: brtc_prod_celery_beat
    <<: *restart-policy
    logging: *default-logging
    command: celery -A brtc_tms beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: brtc_prod_nginx
    <<: *restart-policy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - ./nginx/error-pages:/usr/share/nginx/error-pages:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: brtc_prod_postgres_data
  redis_data:
    name: brtc_prod_redis_data
  static_volume:
    name: brtc_prod_static
  media_volume:
    name: brtc_prod_media
