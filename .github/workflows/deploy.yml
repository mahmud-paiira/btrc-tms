name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brtc_tms_test
          POSTGRES_USER: brtc_test
          POSTGRES_PASSWORD: brtc_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev tesseract-ocr tesseract-ocr-ben \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2

      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: ./backend
        run: python manage.py migrate
        env:
          DJANGO_SECRET_KEY: test-key-not-for-production
          DJANGO_DEBUG: "False"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: brtc_tms_test
          DB_USER: brtc_test
          DB_PASSWORD: brtc_test_pass
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0

      - name: Run tests
        working-directory: ./backend
        run: python manage.py test --noinput --verbosity=2
        env:
          DJANGO_SECRET_KEY: test-key-not-for-production
          DJANGO_DEBUG: "False"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: brtc_tms_test
          DB_USER: brtc_test
          DB_PASSWORD: brtc_test_pass
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build

  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: backend
            dockerfile: backend/Dockerfile.prod
            context: backend
          - name: frontend
            dockerfile: frontend/Dockerfile.prod
            context: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

      - name: Copy compose & config files
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            nginx/prod.conf \
            scripts/backup.sh \
            .env.example \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/opt/brtc-tms/

      - name: Set deployment variables
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /opt/brtc-tms

            # Replace env vars in nginx config
            export DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
            envsubst '$${DOMAIN_NAME}' < nginx/prod.conf > nginx/prod.conf.tmp
            mv nginx/prod.conf.tmp nginx/prod.conf

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py migrate --noinput

            # Collect static
            docker compose -f docker-compose.prod.yml run --rm backend \
              python manage.py collectstatic --noinput --clear

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -af

            echo "Deployment complete"
          EOF

  notify:
    name: Notify
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          fields: repo,message,commit,author,action,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}

      - name: Email notification on failure
        if: ${{ needs.deploy.result == 'failure' }}
        run: |
          echo "Deployment failed for ${{ github.repository }} on ${{ github.ref }}" \
            | mail -s "Deployment Failed" ${{ secrets.ALERT_EMAIL }}
