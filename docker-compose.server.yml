  frontend:
    image: ghcr.io/dream71project/frontend:latest
    container_name: brtc_frontend
    restart: unless-stopped
    volumes:
      - /var/www/nginx/frontend-internal.conf:/etc/nginx/conf.d/default.conf:ro
      - ../data/static:/static:ro
      - ../data/media:/media:ro
    expose:
      - "80"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    networks:
      btrc_network:
