networks:
  btrc_network:
      external: true

services:
  backend:
    image: ghcr.io/dream71project/backend:latest
    container_name: brtc_backend
    restart: unless-stopped
    volumes:
      - ../data/static:/app/staticfiles
      - ../data/media:/app/media
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    networks:
      btrc_network:

